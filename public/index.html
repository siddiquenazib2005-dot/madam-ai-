<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0205"/>
<title>Madam AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0205; --bg2:#110307; --bg3:#160409;
  --crimson:#8b0000; --rose:#c0392b;
  --gold:#c9a84c; --gold2:#e8c97a;
  --cream:#f5e6d3; --text:#e8d5c4; --text2:#a0786a;
  --muted:#5a3030;
  --panel:rgba(139,0,0,0.06); --panel2:rgba(139,0,0,0.12);
  --border:rgba(139,0,0,0.18); --border2:rgba(201,168,76,0.35);
  --green:#4caf88; --red:#ff4444;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Jost',sans-serif;color:var(--text);display:flex;flex-direction:column;position:fixed;inset:0;}

/* LUXURY BG */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% 110%,rgba(100,0,0,0.35) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 0% 50%,rgba(80,0,0,0.2) 0%,transparent 50%),
    radial-gradient(ellipse 40% 40% at 100% 20%,rgba(60,0,0,0.15) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:rgba(10,2,4,0.98);flex-shrink:0;z-index:10;
  position:relative;
}
.topbar-brand{
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:5px;
}
.topbar-right{display:flex;gap:8px;align-items:center;}
.top-btn{
  width:34px;height:34px;background:var(--panel);
  border:1px solid var(--border);color:var(--text2);
  border-radius:4px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.top-btn:hover{color:var(--gold);border-color:var(--border2);}
.status-pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  background:var(--panel);border:1px solid var(--border);
  font-size:10px;color:var(--text2);letter-spacing:.5px;
}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* MESSAGES */
.messages{
  flex:1;overflow-y:auto;position:relative;z-index:5;
  scrollbar-width:thin;scrollbar-color:var(--muted) transparent;
}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--muted);}

/* HOME SCREEN */
.home{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100%;padding:30px 20px;text-align:center;
}
.home-emblem{
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(201,168,76,0.2),rgba(139,0,0,0.15),rgba(10,2,4,0.8));
  border:1px solid rgba(201,168,76,0.25);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;font-size:38px;
  box-shadow:0 0 50px rgba(139,0,0,0.3),inset 0 0 20px rgba(201,168,76,0.05);
  animation:float 5s ease-in-out infinite;
}
/* GLOW ANIMATION */
.home-emblem.glow{
  animation:float 5s ease-in-out infinite, glow-pulse 1s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes glow-pulse{
  0%,100%{box-shadow:0 0 50px rgba(139,0,0,0.3),inset 0 0 20px rgba(201,168,76,0.05);}
  50%{box-shadow:0 0 80px rgba(201,168,76,0.5),0 0 120px rgba(139,0,0,0.4),inset 0 0 30px rgba(201,168,76,0.15);}
}
.home-name{
  font-family:'Cinzel',serif;font-size:30px;font-weight:700;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:8px;margin-bottom:6px;
}
.home-tagline{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;color:var(--text2);letter-spacing:2px;margin-bottom:20px;
}
.pills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:380px;}
.pill{
  padding:7px 14px;background:transparent;border:1px solid var(--border);
  color:var(--text2);font-size:11px;border-radius:2px;
  cursor:pointer;transition:all .2s;font-family:'Jost',sans-serif;
  letter-spacing:.8px;text-transform:uppercase;
}
.pill:hover{background:var(--panel);border-color:var(--border2);color:var(--gold);}

/* MSG LIST */
.msg-list{padding:14px 16px;}
.msg-wrap{display:flex;margin-bottom:14px;animation:appear .2s ease;}
@keyframes appear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.user{justify-content:flex-end;}
.msg-wrap.ai{justify-content:flex-start;}
.msg-row{display:flex;align-items:flex-start;gap:8px;max-width:88%;}
.msg-wrap.user .msg-row{flex-direction:row-reverse;}
.msg-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:13px;
}
.msg-av.ai{
  background:radial-gradient(circle at 40%,rgba(201,168,76,0.15),rgba(139,0,0,0.1));
  border:1px solid var(--border2);
}
.msg-av.user{
  background:var(--panel);border:1px solid var(--border);
  color:var(--gold);font-family:'Cinzel',serif;font-size:11px;font-weight:700;
}
.msg-body{flex:1;min-width:0;}
.msg-wrap.user .msg-body{align-items:flex-end;display:flex;flex-direction:column;}
.tool-tag{
  font-size:9px;padding:2px 8px;margin-bottom:4px;
  background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);
  color:var(--gold);border-radius:2px;display:inline-flex;
  align-items:center;gap:4px;letter-spacing:1.5px;text-transform:uppercase;
}
.bubble{
  padding:10px 13px;border-radius:4px;
  font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;
}
.msg-wrap.ai .bubble{
  background:var(--panel);border:1px solid var(--border);
  border-top-left-radius:1px;color:var(--text);
}
.msg-wrap.user .bubble{
  background:rgba(139,0,0,0.08);border:1px solid rgba(139,0,0,0.2);
  border-top-right-radius:1px;color:var(--text);
}
.bubble pre{
  background:rgba(0,0,0,0.5)!important;border:1px solid var(--border);
  border-radius:4px;padding:10px;overflow-x:auto;margin:8px 0;font-size:12px;
}
.bubble code:not(pre code){
  background:rgba(139,0,0,0.12);padding:1px 5px;
  border-radius:2px;font-size:12px;color:var(--gold2);
}
.copy-code-btn{
  float:right;font-size:10px;padding:2px 8px;background:transparent;
  border:1px solid var(--border);color:var(--text2);border-radius:2px;
  cursor:pointer;margin-bottom:6px;
}
.copy-code-btn:hover{color:var(--gold);}
.msg-time{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.3px;}
.msg-wrap.user .msg-time{text-align:right;}

/* IMAGE in chat */
.chat-img{
  width:100%;max-width:300px;border-radius:4px;margin-top:8px;
  border:1px solid rgba(201,168,76,0.15);cursor:pointer;display:block;
}

/* SMART SUGGESTIONS */
.suggestions{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:0 16px 10px;
}
.sug-btn{
  padding:5px 12px;background:transparent;
  border:1px solid var(--border);color:var(--text2);
  font-size:11px;border-radius:2px;cursor:pointer;
  font-family:'Jost',sans-serif;letter-spacing:.5px;
  transition:all .2s;
}
.sug-btn:hover{background:var(--panel);border-color:var(--border2);color:var(--gold);}

/* TYPING INDICATOR */
.typing-row{display:flex;align-items:flex-start;gap:8px;padding:0 16px 12px;}
.tbub{
  padding:10px 14px;background:var(--panel);
  border:1px solid var(--border);border-radius:4px;
  border-top-left-radius:1px;
}
.typing-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:8px;
}
.dots{display:flex;gap:3px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.3;animation:tdot 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.25s;}
.dot:nth-child(3){animation-delay:.5s;}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

/* INPUT */
.input-area{padding:8px 14px 14px;flex-shrink:0;z-index:10;position:relative;}
.mode-tabs{display:flex;gap:5px;margin-bottom:7px;}
.mode-tab{
  padding:4px 12px;border-radius:2px;background:transparent;
  border:1px solid var(--border);color:var(--muted);
  font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;
  font-family:'Jost',sans-serif;letter-spacing:1.5px;text-transform:uppercase;
}
.mode-tab.on{background:var(--panel);border-color:var(--border2);color:var(--gold);}
.input-box{
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;transition:border-color .2s;overflow:hidden;
}
.input-box:focus-within{border-color:rgba(201,168,76,0.3);}
.fp{
  display:none;align-items:center;gap:8px;
  padding:6px 12px 0;font-size:11px;color:var(--gold);
}
.fp.show{display:flex;}
.fp-x{margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;}
.input-row{display:flex;align-items:flex-end;padding:6px 6px 6px 12px;gap:5px;}
#mi{
  flex:1;background:transparent;border:none;color:var(--text);
  font-family:'Jost',sans-serif;font-size:13px;resize:none;
  min-height:22px;max-height:120px;outline:none;
  scrollbar-width:none;line-height:1.55;padding:5px 0;
}
#mi::placeholder{color:var(--muted);font-size:12px;letter-spacing:.5px;}
.in-btns{display:flex;gap:4px;align-items:flex-end;padding-bottom:1px;}
.ib{
  width:32px;height:32px;border:none;border-radius:3px;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .15s;
}
.ib.att{background:transparent;color:var(--muted);}
.ib.att:hover{color:var(--text);}
.ib.mic{background:transparent;color:var(--muted);}
.ib.mic:hover{color:var(--text);}
.ib.mic.recording{color:var(--red);animation:pulse-rec .8s ease-in-out infinite alternate;}
@keyframes pulse-rec{0%{opacity:1;}100%{opacity:.3;}}
.ib.send{
  background:linear-gradient(135deg,var(--crimson),var(--rose));
  color:#fff;box-shadow:0 2px 10px rgba(139,0,0,0.35);
}
.ib.send:hover{box-shadow:0 2px 16px rgba(139,0,0,0.5);}
.ib.send:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none;}

/* VOICE MODAL */
.vmodal{
  display:none;position:fixed;inset:0;
  background:rgba(8,1,3,0.97);z-index:200;
  flex-direction:column;align-items:center;
  justify-content:center;gap:20px;
  backdrop-filter:blur(20px);
}
.vmodal.show{display:flex;}
.v-orb{
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(201,168,76,0.2),rgba(139,0,0,0.2),rgba(8,1,3,0.8));
  border:1px solid rgba(201,168,76,0.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:40px;position:relative;
  box-shadow:0 0 50px rgba(139,0,0,0.4);transition:all .3s;
}
.v-orb.listening{box-shadow:0 0 80px rgba(139,0,0,0.7);animation:v-pulse .5s ease-in-out infinite alternate;}
.v-orb.speaking{box-shadow:0 0 80px rgba(201,168,76,0.5);}
@keyframes v-pulse{0%{transform:scale(1);}100%{transform:scale(1.06);}}
.vlabel{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:4px;}
.vtxt{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:14px;color:var(--text2);max-width:260px;text-align:center;min-height:18px;
}
.vend{
  padding:7px 22px;background:transparent;
  border:1px solid rgba(139,0,0,0.3);color:rgba(139,0,0,0.6);
  border-radius:2px;cursor:pointer;font-size:10px;
  font-family:'Jost',sans-serif;letter-spacing:2.5px;text-transform:uppercase;transition:all .2s;
}
.vend:hover{border-color:var(--rose);color:var(--rose);}

/* SETTINGS */
.smodal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);z-index:300;
  align-items:center;justify-content:center;backdrop-filter:blur(10px);
}
.smodal.show{display:flex;}
.sbox{
  background:#100305;border:1px solid var(--border2);
  border-radius:6px;width:92%;max-width:360px;overflow:hidden;
}
.shead{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.shead-title{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;
}
.sclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}
.sbody{padding:16px;}
.sfld{margin-bottom:12px;}
.sfld label{display:block;font-size:9px;color:var(--text2);margin-bottom:4px;letter-spacing:2.5px;text-transform:uppercase;}
.sinput{
  width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);
  color:var(--text);font-family:'Jost',sans-serif;font-size:13px;
  padding:8px 11px;border-radius:3px;outline:none;
}
.sinput:focus{border-color:rgba(201,168,76,0.3);}
.tts-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:var(--panel);
  border:1px solid var(--border);border-radius:3px;margin-bottom:12px;
}
.tog{width:40px;height:22px;border-radius:11px;background:var(--muted);border:none;cursor:pointer;position:relative;transition:background .2s;}
.tog.on{background:var(--crimson);}
.tok{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--cream);transition:transform .2s;}
.tog.on .tok{transform:translateX(18px);}
.sbtns{display:flex;gap:8px;margin-top:6px;}
.sbtn{flex:1;padding:9px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;font-family:'Jost',sans-serif;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border);transition:all .15s;}
.sbtn.p{background:linear-gradient(135deg,var(--crimson),var(--rose));color:#fff;border-color:var(--crimson);}
.sbtn.s{background:transparent;color:var(--muted);}

/* PITCH/RATE SLIDERS */
.slider-row{margin-bottom:10px;}
.slider-row input[type=range]{width:100%;accent-color:var(--gold);}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:#100305;border:1px solid var(--border2);
  color:var(--gold);font-size:11px;padding:6px 16px;
  border-radius:3px;z-index:400;opacity:0;
  transition:opacity .2s;pointer-events:none;white-space:nowrap;letter-spacing:.5px;
}
.toast.show{opacity:1;}

@media(display-mode:standalone){
  .topbar{padding-top:max(12px,env(safe-area-inset-top));}
  .input-area{padding-bottom:max(14px,env(safe-area-inset-bottom));}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">MADAM</div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt">Connecting</span>
    </div>
    <button class="top-btn" onclick="openVoiceMode()" title="Voice Mode">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
    </button>
    <button class="top-btn" onclick="openSet()" title="Settings">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
    <button class="top-btn" onclick="clearChat()" title="New Chat">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages" id="msgs">
  <div class="home" id="home">
    <div class="home-emblem" id="emblem">👑</div>
    <div class="home-name">MADAM</div>
    <div class="home-tagline">My Adaptive Digital Assistant &amp; Manager</div>
    <div class="pills">
      <div class="pill" data-q="What can you do?">Capabilities</div>
      <div class="pill" data-q="Delhi ka weather batao">Weather</div>
      <div class="pill" data-q="Latest news kya hai">News</div>
      <div class="pill" data-q="100 USD to INR calculate karo">Currency</div>
      <div class="pill" data-q="Python mein hello world likho">Write Code</div>
      <div class="pill" data-q="Mujhe motivate karo Sir">Motivate Me</div>
    </div>
  </div>
  <div class="msg-list" id="msgList" style="display:none;"></div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="mode-tabs">
    <button class="mode-tab on" id="tabAssistant" onclick="setMode('assistant')">Assistant</button>
    <button class="mode-tab"    id="tabCoder"     onclick="setMode('coder')">Coder</button>
    <button class="mode-tab"    id="tabResearch"  onclick="setMode('research')">Research</button>
  </div>
  <div class="input-box">
    <div class="input-row">
      <textarea id="mi" placeholder="Ask Madam anything, Sir..." rows="1"></textarea>
      <div class="in-btns">
        <button class="ib mic" id="micBtn" onclick="toggleRecording()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <button class="ib send" id="sndBtn" onclick="send()">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- VOICE MODAL -->
<div class="vmodal" id="vmodal">
  <div class="v-orb" id="vorb" onclick="tapVoice()">👑</div>
  <div class="vlabel" id="vlabel">Tap Crown to Speak</div>
  <div class="vtxt"  id="vtxt">Madam is ready...</div>
  <button class="vend" onclick="closeVoice()">End Session</button>
</div>

<!-- SETTINGS -->
<div class="smodal" id="smodal">
  <div class="sbox">
    <div class="shead">
      <span class="shead-title">Configuration</span>
      <button class="sclose" onclick="closeSet()">×</button>
    </div>
    <div class="sbody">
      <div class="sfld"><label>Backend URL</label><input class="sinput" id="sUrl" placeholder="http://localhost:3000"/></div>
      <div class="sfld"><label>User ID</label><input class="sinput" id="sUserId" placeholder="user_1"/></div>
      <div class="tts-row">
        <div>
          <div style="font-size:12px;font-weight:500;">Voice Responses</div>
          <div style="font-size:10px;color:var(--muted);">Madam speaks aloud</div>
        </div>
        <button class="tog" id="ttsTog" onclick="togTts()"><div class="tok"></div></button>
      </div>
      <div class="slider-row sfld">
        <label>Voice Pitch: <span id="pitchVal">1.1</span></label>
        <input type="range" id="sPitch" min="0.5" max="2" step="0.1" value="1.1"
               oninput="document.getElementById('pitchVal').textContent=this.value"/>
      </div>
      <div class="slider-row sfld">
        <label>Voice Rate: <span id="rateVal">0.92</span></label>
        <input type="range" id="sRate" min="0.5" max="1.5" step="0.05" value="0.92"
               oninput="document.getElementById('rateVal').textContent=this.value"/>
      </div>
      <div class="sbtns">
        <button class="sbtn s" onclick="closeSet()">Cancel</button>
        <button class="sbtn p" onclick="saveSet()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
var G=function(k){return localStorage.getItem(k);};
var S=function(k,v){localStorage.setItem(k,v);};

var cfg = {
  backend: G('m_b') || window.location.origin,
  userId:  G('m_u') || 'user_1',
  tts:     G('m_t') === 'true',
  pitch:   parseFloat(G('m_p') || '1.1'),
  rate:    parseFloat(G('m_r') || '0.92'),
};

var mode       = 'assistant';
var chatOpen   = false;
var isRecording = false;
var mediaRec   = null;
var audioChunks = [];
var voiceOn    = false;
var synth      = window.speechSynthesis;

// Smart suggestions per intent
var SUGGESTIONS = {
  weather:    ['Tomorrow forecast?', 'Humidity kitna hai?', 'Weekly weather?'],
  news:       ['Tech news batao', 'Sports headlines', 'Business news?'],
  code:       ['Explain this code', 'Add error handling', 'Optimize karo'],
  calculator: ['Another calculation?', 'Percentage nikalo', 'Currency convert?'],
  assistant:  ['Tell me a joke', 'Motivate karo', 'Plan my day'],
  research:   ['More details?', 'Related topics?', 'Summarize karo'],
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sUrl').value    = cfg.backend;
  document.getElementById('sUserId').value = cfg.userId;
  document.getElementById('sPitch').value  = cfg.pitch;
  document.getElementById('sRate').value   = cfg.rate;
  document.getElementById('pitchVal').textContent = cfg.pitch;
  document.getElementById('rateVal').textContent  = cfg.rate;
  if (cfg.tts) document.getElementById('ttsTog').classList.add('on');

  if (synth) synth.getVoices();
  if (synth) synth.onvoiceschanged = function() { synth.getVoices(); };

  // Suggestion pills on home screen
  document.querySelectorAll('.pill').forEach(function(p) {
    p.addEventListener('click', function() {
      document.getElementById('mi').value = p.getAttribute('data-q');
      send();
    });
  });

  document.getElementById('mi').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById('mi').addEventListener('input', function() { resize(this); });

  // Ping backend
  fetch(cfg.backend + '/ping')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('statusTxt').textContent = 'Online · ' + d.version;
      document.getElementById('statusDot').style.background = 'var(--green)';
    })
    .catch(function() {
      document.getElementById('statusTxt').textContent = 'Offline';
      document.getElementById('statusDot').style.background = 'var(--red)';
    });
});

// ══════════════════════════════════════════
// MODE TABS
// ══════════════════════════════════════════
function setMode(m) {
  mode = m;
  ['assistant','coder','research'].forEach(function(x) {
    var el = document.getElementById('tab' + x.charAt(0).toUpperCase() + x.slice(1));
    if (el) el.classList.toggle('on', x === m);
  });
  var hints = {
    assistant: 'Ask Madam anything, Sir...',
    coder:     'Describe what to code, Sir...',
    research:  'What shall I research, Sir...',
  };
  document.getElementById('mi').placeholder = hints[m] || 'Ask Madam...';
}

// ══════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════
async function send() {
  var inp = document.getElementById('mi');
  var msg = inp.value.trim();
  if (!msg) return;
  inp.value = ''; resize(inp);
  showChat();

  addMsg(msg, 'user');
  var typ = showTyping();
  document.getElementById('sndBtn').disabled = true;
  glowEmblem(true);

  try {
    var r = await fetch(cfg.backend + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, userId: cfg.userId, agent: mode }),
    });
    var data = await r.json();
    rmTyping(typ);
    glowEmblem(false);

    var reply = data.reply || data.error || 'No response.';
    addMsg(reply, 'ai', data.tool || null, data.imageUrl || null);
    showSuggestions(data.tool || mode);
    if (cfg.tts) speakText(reply);

  } catch (e) {
    rmTyping(typ);
    glowEmblem(false);
    addMsg('Sir, connection error. Please check backend URL in Settings.', 'ai');
  }

  document.getElementById('sndBtn').disabled = false;
}

// ══════════════════════════════════════════
// MESSAGE UI
// ══════════════════════════════════════════
function addMsg(text, role, tool, imageUrl) {
  var el = document.getElementById('msgList');

  // Remove previous suggestions when new message comes
  var prevSugs = document.querySelector('.suggestions');
  if (prevSugs) prevSugs.remove();

  var wrap = document.createElement('div'); wrap.className = 'msg-wrap ' + role;
  var row  = document.createElement('div'); row.className  = 'msg-row';
  var av   = document.createElement('div');

  if (role === 'ai') {
    av.className = 'msg-av ai'; av.textContent = '👑';
  } else {
    av.className = 'msg-av user';
    av.textContent = cfg.userId.charAt(0).toUpperCase();
  }

  var body = document.createElement('div'); body.className = 'msg-body';

  if (tool && role === 'ai') {
    var tag = document.createElement('div'); tag.className = 'tool-tag';
    tag.textContent = '⚡ ' + tool.replace('_',' ').toUpperCase();
    body.appendChild(tag);
  }

  var bub = document.createElement('div'); bub.className = 'bubble';

  if (role === 'ai' && typeof marked !== 'undefined') {
    bub.innerHTML = marked.parse(text);
    bub.querySelectorAll('pre').forEach(function(pre) {
      var btn = document.createElement('button');
      btn.className = 'copy-code-btn'; btn.textContent = 'Copy';
      btn.onclick = function() {
        var code = pre.querySelector('code');
        navigator.clipboard.writeText(code ? code.textContent : pre.textContent)
          .then(function() { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 2000); });
      };
      pre.insertBefore(btn, pre.firstChild);
      if (typeof hljs !== 'undefined')
        pre.querySelectorAll('code').forEach(function(c) { hljs.highlightElement(c); });
    });
  } else {
    bub.textContent = text;
  }

  // Image if present
  if (imageUrl) {
    var img = document.createElement('img');
    img.className = 'chat-img';
    img.src = imageUrl;
    img.onclick = function() { window.open(imageUrl, '_blank'); };
    img.onerror = function() { img.style.display = 'none'; };
    bub.appendChild(img);
  }

  var time = document.createElement('div'); time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

  body.appendChild(bub); body.appendChild(time);

  if (role === 'ai') {
    row.appendChild(av); row.appendChild(body);
  } else {
    row.appendChild(body); row.appendChild(av);
  }
  wrap.appendChild(row); el.appendChild(wrap);
  document.getElementById('msgs').scrollTop = 99999;
}

function showTyping() {
  var msgs = document.getElementById('msgs');
  var row  = document.createElement('div'); row.className = 'typing-row'; row.id = 'typ';
  var av   = document.createElement('div'); av.className = 'msg-av ai'; av.textContent = '👑';
  var bub  = document.createElement('div'); bub.className = 'tbub';
  var txt  = document.createElement('div'); txt.className = 'typing-text';
  txt.innerHTML = 'Madam is thinking <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  bub.appendChild(txt); row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row); msgs.scrollTop = 99999;
  return row;
}
function rmTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function showSuggestions(context) {
  var sugs = SUGGESTIONS[context] || SUGGESTIONS.assistant;
  var div  = document.createElement('div'); div.className = 'suggestions';
  sugs.forEach(function(s) {
    var btn = document.createElement('button'); btn.className = 'sug-btn';
    btn.textContent = s;
    btn.onclick = function() {
      document.getElementById('mi').value = s;
      send();
    };
    div.appendChild(btn);
  });
  document.getElementById('msgList').appendChild(div);
  document.getElementById('msgs').scrollTop = 99999;
}

function showChat() {
  if (!chatOpen) {
    chatOpen = true;
    document.getElementById('home').style.display    = 'none';
    document.getElementById('msgList').style.display = 'block';
  }
}

function clearChat() {
  chatOpen = false;
  document.getElementById('msgList').innerHTML  = '';
  document.getElementById('msgList').style.display = 'none';
  document.getElementById('home').style.display    = 'flex';
  showToast('New conversation started');
}

function glowEmblem(on) {
  var el = document.getElementById('emblem');
  if (!el) return;
  if (on) el.classList.add('glow'); else el.classList.remove('glow');
}

// ══════════════════════════════════════════
// VOICE INPUT (Groq Whisper / Browser STT)
// ══════════════════════════════════════════
async function toggleRecording() {
  if (!isRecording) await startRecording();
  else stopRecording();
}

async function startRecording() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    var mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    mediaRec = new MediaRecorder(stream, { mimeType: mime });
    mediaRec.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.onstop = async function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(audioChunks, { type: mime });
      await transcribeAudio(blob);
    };
    mediaRec.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    showToast('● Recording...');
  } catch (e) {
    browserSTT();
  }
}

function stopRecording() {
  if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  showToast('Processing...');
}

async function transcribeAudio(blob) {
  try {
    var fd = new FormData();
    fd.append('audio', blob, 'audio.webm');
    var r = await fetch(cfg.backend + '/api/transcribe', { method: 'POST', body: fd });
    var d = await r.json();
    if (d.text) {
      document.getElementById('mi').value = d.text;
      resize(document.getElementById('mi'));
      showToast('✓ ' + d.text.slice(0, 30));
    } else {
      browserSTT();
    }
  } catch (e) {
    browserSTT();
  }
}

function browserSTT() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not supported'); return; }
  var rec = new SR(); rec.lang = 'en-IN'; rec.interimResults = false;
  rec.onresult = function(e) {
    var t = e.results[0][0].transcript;
    document.getElementById('mi').value = t;
    resize(document.getElementById('mi'));
    showToast('✓ ' + t.slice(0, 25));
  };
  rec.onerror = function() { showToast('Could not hear clearly'); };
  rec.start();
  showToast('🎙 Listening...');
}

// ══════════════════════════════════════════
// VOICE CONVERSATION MODE
// ══════════════════════════════════════════
function openVoiceMode() {
  voiceOn = true;
  document.getElementById('vmodal').classList.add('show');
}

function tapVoice() {
  var orb = document.getElementById('vorb');
  if (orb.classList.contains('listening') || orb.classList.contains('speaking')) return;
  startVoiceConv();
}

async function startVoiceConv() {
  var orb = document.getElementById('vorb');
  orb.classList.add('listening');
  document.getElementById('vlabel').textContent = 'Listening...';
  document.getElementById('vtxt').textContent   = 'Speak now, Sir...';
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    var chunks = [];
    var mr = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mr.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
    mr.onstop = async function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      orb.classList.remove('listening');
      document.getElementById('vlabel').textContent = 'Processing...';
      var blob = new Blob(chunks, { type: 'audio/webm' });
      var text = '';
      try {
        var fd = new FormData(); fd.append('audio', blob, 'audio.webm');
        var r  = await fetch(cfg.backend + '/api/transcribe', { method: 'POST', body: fd });
        var d  = await r.json(); text = d.text || '';
      } catch (e) {}
      if (!text) { document.getElementById('vlabel').textContent = 'Tap Crown to Speak'; return; }
      document.getElementById('vtxt').textContent = text;
      showChat(); addMsg(text, 'user');
      try {
        var cr = await fetch(cfg.backend + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, userId: cfg.userId, agent: 'assistant' }),
        });
        var cd = await cr.json();
        var reply = cd.reply || 'No response.';
        addMsg(reply, 'ai', cd.tool || null, cd.imageUrl || null);
        orb.classList.add('speaking');
        document.getElementById('vlabel').textContent = 'Speaking...';
        document.getElementById('vtxt').textContent   = reply.slice(0, 60) + (reply.length > 60 ? '...' : '');
        await speakWait(reply);
        if (voiceOn) {
          orb.classList.remove('speaking');
          document.getElementById('vlabel').textContent = 'Tap Crown to Speak';
          document.getElementById('vtxt').textContent   = 'Ready, Sir...';
        }
      } catch (e) {
        document.getElementById('vlabel').textContent = 'Error — Try again';
      }
    };
    mr.start();
    setTimeout(function() { if (mr.state !== 'inactive') mr.stop(); }, 8000);
  } catch (e) {
    // Browser fallback
    orb.classList.remove('listening');
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('vlabel').textContent = 'Not supported'; return; }
    var rec = new SR(); rec.lang = 'en-IN';
    rec.onresult = async function(e) {
      var text = e.results[0][0].transcript;
      showChat(); addMsg(text, 'user');
      var cr = await fetch(cfg.backend + '/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, userId: cfg.userId }),
      });
      var cd = await cr.json();
      addMsg(cd.reply || 'No response.', 'ai');
      orb.classList.add('speaking');
      await speakWait(cd.reply || '');
      if (voiceOn) { orb.classList.remove('speaking'); document.getElementById('vlabel').textContent = 'Tap Crown to Speak'; }
    };
    rec.start();
  }
}

// ══════════════════════════════════════════
// TTS — Female voice with pitch/rate control
// ══════════════════════════════════════════
function getFemaleVoice() {
  if (!synth) return null;
  var voices  = synth.getVoices();
  var prefer  = ['Samantha','Karen','Moira','Tessa','Veena','Fiona','Victoria'];
  for (var i = 0; i < voices.length; i++) {
    if (prefer.indexOf(voices[i].name) > -1) return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === 'en-IN' || voices[i].lang === 'en-GB') return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.startsWith('en')) return voices[i];
  }
  return null;
}

function speakText(text) {
  if (!text || !cfg.tts || !synth) return;
  var clean = text.replace(/[#*`\[\]]/g, '').slice(0, 400);
  synth.cancel();
  var u = new SpeechSynthesisUtterance(clean);
  u.lang = 'en-IN'; u.rate = cfg.rate; u.pitch = cfg.pitch;
  var v = getFemaleVoice(); if (v) u.voice = v;
  synth.speak(u);
}

async function speakWait(text) {
  return new Promise(function(resolve) {
    if (!synth) { resolve(); return; }
    var clean = text.replace(/[#*`\[\]]/g, '').slice(0, 400);
    synth.cancel();
    var u = new SpeechSynthesisUtterance(clean);
    u.lang = 'en-IN'; u.rate = cfg.rate; u.pitch = cfg.pitch;
    var v = getFemaleVoice(); if (v) u.voice = v;
    u.onend = function() { resolve(); };
    u.onerror = function() { resolve(); };
    synth.speak(u);
  });
}

function closeVoice() {
  voiceOn = false;
  if (synth) synth.cancel();
  document.getElementById('vmodal').classList.remove('show');
  document.getElementById('vorb').classList.remove('listening', 'speaking');
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function openSet()  { document.getElementById('smodal').classList.add('show'); }
function closeSet() { document.getElementById('smodal').classList.remove('show'); }
function togTts() {
  cfg.tts = !cfg.tts;
  var t = document.getElementById('ttsTog');
  if (cfg.tts) t.classList.add('on'); else t.classList.remove('on');
}
function saveSet() {
  cfg.backend = document.getElementById('sUrl').value.trim()    || window.location.origin;
  cfg.userId  = document.getElementById('sUserId').value.trim() || 'user_1';
  cfg.pitch   = parseFloat(document.getElementById('sPitch').value);
  cfg.rate    = parseFloat(document.getElementById('sRate').value);
  S('m_b', cfg.backend); S('m_u', cfg.userId);
  S('m_t', cfg.tts);     S('m_p', cfg.pitch); S('m_r', cfg.rate);
  closeSet(); showToast('Settings saved ✓');
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2400);
}
</script>
</body>
</html>
